<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Registration</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">Product Hub</div>
        <ul class="nav-links">
            <li><a href="home.html">Home</a></li>
            <li><a href="products.html">Produtos</a></li>
            <li><a href="product_form.html">Cadastrar</a></li>
            <li><a href="#">Contato</a></li>
        </ul>
    </nav>
    
    <div class="container">
        <h1>Product Registration Form</h1>
        <form>
            <div class="form-group">
                <label for="nameInput">Name:</label>
                <input type="text" id="nameInput" name="name" required>
            </div>
            <div class="form-group">
                <label for="descriptionInput">Description:</label>
                <textarea id="descriptionInput" name="descriptionInput" rows="4" required></textarea>
            </div>
            <div class="form-group">
                <label for="categorySelect">Category:</label>
                <select id="categorySelect" name="categorySelect" required>
                    <option value="">Select a category</option>
                    <option value="electronics">Electronics</option>
                    <option value="clothing">Clothing</option>
                    <option value="books">Books</option>
                    <option value="home">Home & Garden</option>
                    <option value="sports">Sports</option>
                    <option value="other">Other</option>
                </select>
            </div>
            <div class="form-group">
                <label for="priceInput">Price:</label>
                <input type="number" id="priceInput" name="price" step="0.01" min="0" required>
            </div>
            <div class="form-group">
                <label for="quantityInput">Quantity in Stock:</label>
                <input type="number" id="quantityInput" name="quantity" min="0" required>
            </div>
            <button type="button" id="addButton">Register Product</button>
        </form>
    </div>
    <script type="module" src="js/app.js"></script>
    <script type="module" src="js/form.js"></script>
</body>
</html></content>
